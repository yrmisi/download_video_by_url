user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 8192;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Сетевые оптимизации
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65;
    keepalive_requests 1000;

    # Увеличиваем размер тела под нужды медиа (если через веб будут загружаться метаданные/картинки)
    client_max_body_size 100M;
    client_body_buffer_size 256k;

    # Настройки кэширования прокси для стабильной потоковой передачи
    proxy_buffering off; # ОТКЛЮЧАЕМ буферизацию для медиа-потоков. Иначе Nginx будет пытаться выкачать всё видео в свой кэш перед отдачей пользователю.

    # Таймауты для тяжелых запросов и долгих загрузок видео
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    # Gzip сжатие текстовых файлов
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/javascript application/json image/svg+xml;

    resolver 127.0.0.11 valid=30s; # Docker DNS

    upstream api_server {
        server web:8000;
        keepalive 64;
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Хелсчек для самого Nginx
        location /health {
            access_log off;
            return 200 'OK';
        }

        # Фронтенд (SPA / Static)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Все запросы к API (включая /api/files/) уходят на FastAPI
        location /api/ {
            proxy_pass http://api_server;

            # Конфигурация HTTP/1.1 и keep-alive для апстрима
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Проброс заголовков клиента
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header Cookie $http_cookie;

            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        }
    }
}
