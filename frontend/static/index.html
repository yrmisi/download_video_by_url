<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💾</text></svg>" />
    <title>MediaGrab — Video & Audio Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body class="flex items-center justify-center min-h-screen bg-[#1a1a1a] text-gray-100">

    <main id="app" class="w-full max-w-xl p-6 card shadow-2xl overflow-y-auto bg-[#222] rounded-xl border border-gray-800">

      <div id="step-input" tabindex="-1" class="text-center space-y-6 focus:outline-none">
        <h1 class="text-3xl font-bold tracking-tight text-white">MediaGrab</h1>
        <p id="url-description" class="text-gray-400">Paste the link to the video or audio file to start downloading</p>

        <div class="space-y-2 text-left">
          <label for="video-url" class="sr-only">Link to the media file</label>
          <input
            type="url"
            id="video-url"
            placeholder="Enter the URL link (YouTube, VK, etc)..."
            aria-describedby="url-description"
            class="w-full p-3 rounded bg-[#333] border border-gray-600 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed transition"
          />
        </div>

        <button
          onclick="fetchInfo()"
          id="btn-continue"
          class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 px-8 py-2.5 rounded font-medium text-white transition focus:ring-2 focus:ring-blue-400 focus:outline-none disabled:opacity-70 disabled:cursor-not-allowed inline-flex items-center justify-center"
        >
          Continue
        </button>
      </div>

      <section id="history-section" class="mt-8 hidden" aria-labelledby="history-heading">
        <hr class="border-gray-800 my-6" />
        <h3 id="history-heading" class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4">
          Recent Downloads
        </h3>
        <div id="history-list" class="space-y-3" role="list" aria-label="История ваших загрузок">
          </div>
      </section>

      <div id="step-preview" tabindex="-1" class="hidden space-y-6 focus:outline-none">
        <h2 id="video-title" class="text-xl font-semibold text-center text-white truncate" aria-live="polite"></h2>

        <div class="relative aspect-video rounded-lg overflow-hidden bg-black border border-gray-800">
          <img id="video-thumb" src="" class="w-full h-full object-cover" alt="Превью контента" />
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-left">
          <div>
            <label for="profile" class="block text-sm font-medium text-gray-300 mb-2">Profile</label>
            <select id="profile" class="w-full p-2.5 bg-[#333] border border-gray-600 rounded text-white focus:border-blue-500 focus:outline-none">
              <option value="pc_tv">PC/TV (MKV/4K)</option>
              <option value="legacy_tv">Legacy TV (MP4/H.264)</option>
              <option value="mobile">Mobile (720p/MP4)</option>
              <option value="mp4">Fast & Compatible (MP4)</option>
              <option value="audio_only">Audio Only (MP3)</option>
            </select>
          </div>
          <div>
            <div id="quality-container">
              <label for="quality" class="block text-sm font-medium text-gray-300 mb-2">Quality Limit</label>
              <select id="quality" class="w-full p-2.5 bg-[#333] border border-gray-600 rounded text-white focus:border-blue-500 focus:outline-none">
                <option value="2160">2160p (4K)</option>
                <option value="1080">1080p</option>
                <option value="720">720p</option>
                <option value="360">360p</option>
                <option value="240">240p</option>
                <option value="144">144p</option>
              </select>
            </div>
          </div>
        </div>

        <div class="flex justify-between items-center pt-4 border-t border-gray-800">
          <button onclick="showStep('input')" class="text-gray-400 hover:text-white font-medium focus:underline focus:outline-none">
            Back
          </button>
          <button onclick="startDownload()" class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-2 rounded font-medium shadow-md transition focus:ring-2 focus:ring-blue-400 focus:outline-none">
            Start
          </button>
        </div>
      </div>

      <div id="step-progress" tabindex="-1" class="hidden space-y-6 text-center focus:outline-none">
        <h2 class="text-xl font-semibold text-white">Progress Status</h2>

        <div id="progress-container" class="w-full bg-gray-800 rounded-full h-3 mt-4 overflow-hidden">
          <div
            id="progress-bar"
            class="bg-blue-600 h-full rounded-full transition-all duration-300"
            role="progressbar"
            aria-valuenow="0"
            aria-valuemin="0"
            aria-valuemax="100"
            style="width: 0%"
          ></div>
        </div>

        <div class="flex justify-between text-sm text-gray-300 font-medium px-1" role="status">
          <span id="status-text">Starting...</span>
          <span id="speed-text" aria-label="Скорость скачивания">0 MB/s</span>
        </div>

        <div id="download-ready-container" class="hidden mt-6">
          <a
            id="download-link"
            href="#"
            class="inline-block bg-green-600 hover:bg-green-700 text-white px-10 py-3 rounded-lg font-bold shadow-lg transform transition hover:scale-105 focus:ring-2 focus:ring-green-400 focus:outline-none"
          >
            💾 Download Ready
          </a>
        </div>

        <div class="pt-4 border-t border-gray-800">
          <button
            id="action-button"
            onclick="cancelDownload()"
            class="bg-[#333] hover:bg-[#444] text-gray-200 hover:text-white px-10 py-2 rounded transition border border-gray-700 focus:ring-2 focus:ring-gray-500 focus:outline-none"
          >
            Stop
          </button>
        </div>
      </div>
    </main>

    <script src="/js/app.js"></script>
  </body>
</html>
